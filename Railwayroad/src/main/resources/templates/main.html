<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>철도 조회 시스템</title>

    <!--<link rel="stylesheet" href="https://cdn3.devexpress.com/jslib/23.2.4/css/dx.common.css">
    <link rel="stylesheet" href="https://cdn3.devexpress.com/jslib/23.2.4/css/dx.material.blue.light.compact.css">
    <link rel="stylesheet" href="https://cdn3.devexpress.com/jslib/23.2.4/css/dx.material.blue.light.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.css">-->
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #0f4898; margin: 5%; padding: 20px; }
        .header { text-align: center; margin-bottom: 20px; }
        .card-container { display: flex; justify-content: space-between; gap: 15px; margin-bottom: 20px; }
        .high_speed_train { flex: 1; background: #650ebd; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .regular_train { flex: 1; background: #ff0000; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .subway_line { flex: 1; background: #b3a7a7; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .total { flex: 1; background: #b3a7a7; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
    </style>
</head>
<body>
<div class="header">
    <h1>철도 조회 시스템</h1>   <!--실행되면 제일 위에 굵은 글씨로 뜨는 얘-->
</div>

<div class="total"
    onclick="location.href='/second'">

    <h2>전체 조회</h2>
    <p> 통합 데이터 조회 </p>
</div>

<div class="high_speed_train"
     onclick="location.href='/second'">

    <h2>고속열차</h2>
    <p> KTX / SRT </p>
</div>

<div class="regular_train"
     onclick="location.href='/second'">

    <h2>일반열차</h2>
    <p> 무궁화 / ITX </p>
</div>

<div class="subway_line"
     onclick="location.href='/second'">

    <h2>지하철</h2>
    <p> 서울 1호선 </p>
</div>

<div id="gridContainer"></div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn3.devexpress.com/jslib/23.2.4/js/dx.all.js"></script>
<script src="https://cdn3.devexpress.com/jslib/23.2.4/js/dx-quill.js"></script>
<script src="/js/home.js"></script>
</body>
</html>
