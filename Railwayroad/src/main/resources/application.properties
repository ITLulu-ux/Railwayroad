# DBMS
spring.datasource.url=jdbc:mysql://localhost:3306/railway_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=myjoin*
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA ??
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
debug=true

spring.jackson.default-property-inclusion=always

spring.freemaker.cache=false
spring.devtools.livereload.enabled=true

#mybatis
mybatis.configuration.map-underscore-to-camel-case=true
logging.level.hello.board.repository.mybatis=trace
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=directory.my.db.domain
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl




